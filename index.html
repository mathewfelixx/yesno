<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>hey</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #0e0e0e;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #555;
      --yes: #4ade80;
      --no: #f87171;
      --maybe: #facc15;
      --idk: #818cf8;
      --hmm: #94a3b8;
      --thankyou: #f9a8d4;
      --heart: #fb7185;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .status {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 48px;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    .status.sent {
      color: var(--yes);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 280px;
    }

    .btn {
      height: 80px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 0.1s, background 0.15s, border-color 0.15s;
      position: relative;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn.hmm {
      grid-column: span 2;
      height: 60px;
    }

    .btn[data-val="yes"]:active    { background: #16301f; border-color: var(--yes); color: var(--yes); }
    .btn[data-val="no"]:active     { background: #301616; border-color: var(--no); color: var(--no); }
    .btn[data-val="maybe"]:active  { background: #2e2a10; border-color: var(--maybe); color: var(--maybe); }
    .btn[data-val="idk"]:active    { background: #1a1a30; border-color: var(--idk); color: var(--idk); }
    .btn[data-val="hmm"]:active    { background: #1e2228; border-color: var(--hmm); color: var(--hmm); }
    .btn[data-val="thank you"]:active { background: #281520; border-color: var(--thankyou); color: var(--thankyou); }
    .btn[data-val="<3"]:active     { background: #280d12; border-color: var(--heart); color: var(--heart); }

    .btn.flash-yes      { background: #16301f !important; border-color: var(--yes) !important; color: var(--yes) !important; }
    .btn.flash-no       { background: #301616 !important; border-color: var(--no) !important; color: var(--no) !important; }
    .btn.flash-maybe    { background: #2e2a10 !important; border-color: var(--maybe) !important; color: var(--maybe) !important; }
    .btn.flash-idk      { background: #1a1a30 !important; border-color: var(--idk) !important; color: var(--idk) !important; }
    .btn.flash-hmm      { background: #1e2228 !important; border-color: var(--hmm) !important; color: var(--hmm) !important; }
    .btn.flash-thankyou { background: #281520 !important; border-color: var(--thankyou) !important; color: var(--thankyou) !important; }
    .btn.flash-heart    { background: #280d12 !important; border-color: var(--heart) !important; color: var(--heart) !important; }
  </style>
</head>
<body>

  <div class="status" id="status">tap to respond</div>

  <div class="grid">
    <button class="btn" data-val="yes">yes</button>
    <button class="btn" data-val="no">no</button>
    <button class="btn" data-val="maybe">maybe</button>
    <button class="btn" data-val="idk">idk</button>
    <button class="btn hmm" data-val="hmm">hmm</button>
    <button class="btn hmm" data-val="thank you">thank you</button>
    <button class="btn hmm" data-val="<3">&lt;3</button>
  </div>

  <script>
    const SUPABASE_URL = 'https://yoqisrbmrwkockwyplth.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvcWlzcmJtcndrb2Nrd3lwbHRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMzk4MTYsImV4cCI6MjA5NDYxNTgxNn0.wI7gcSVvaKC7k409DOIrOXmO25ytiDdp-P-vmoKdXHY';

    const status = document.getElementById('status');

    async function send(val, flashKey) {
      flashKey = flashKey || val;
      const btn = document.querySelector(`[data-val="${val}"]`);
      btn.classList.add(`flash-${flashKey}`);
      status.textContent = `sent: ${val}`;
      status.classList.add('sent');

      try {
        await fetch(`${SUPABASE_URL}/rest/v1/responses?id=eq.1`, {
          method: 'PATCH',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ value: val })
        });
      } catch (e) {
        status.textContent = 'failed to send';
        status.classList.remove('sent');
      }

      setTimeout(() => {
        btn.classList.remove(`flash-${flashKey}`);
        status.textContent = 'tap to respond';
        status.classList.remove('sent');
      }, 1500);
    }

    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const val = btn.dataset.val;
        const flashKey = val === "thank you" ? "thankyou" : val === "<3" ? "heart" : val;
        send(val, flashKey);
      });
    });
  </script>
</body>
</html>
